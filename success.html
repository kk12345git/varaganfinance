<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Success — Varagan Finance</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="styles.css">
<link rel="icon" type="image/png" href="logo.png">
</head>
<body>

<section class="success-page">
  <div class="success-card">
    <div class="success-icon">
      <i class="fas fa-check"></i>
    </div>
    <h1 id="successName">Thank You!</h1>
    <p>Your application has been successfully received. We are now redirecting you to Jaihari's WhatsApp for instant confirmation...</p>
    
    <div class="loader-content" style="margin: 2rem 0;">
      <div class="progress-bar-container" style="width:100%; height:4px; background:rgba(255,255,255,0.1); border-radius:10px; overflow:hidden;">
        <div id="waProgress" style="width:0%; height:100%; background:#25D366; transition: width 2s linear;"></div>
      </div>
    </div>

    <div class="next-steps">
      <h4>Next Steps</h4>
      <div class="ns-item">
        <i class="fas fa-circle-check"></i>
        <span>Our team will call you within <strong>2 business hours</strong>.</span>
      </div>
      <div class="ns-item">
        <i class="fas fa-circle-check"></i>
        <span>Keep your <strong>Original PAN & Aadhaar</strong> ready.</span>
      </div>
    </div>

    <div style="display:flex; gap:1.5rem; justify-content:center; flex-wrap:wrap;">
      <a href="index.html" class="nav-link" style="opacity:0.7;">Return to Homepage</a>
    </div>
  </div>
</section>

<script>
  // Logic to personalize the page and build Jaihari's WhatsApp link
  document.addEventListener('DOMContentLoaded', () => {
    const data = JSON.parse(localStorage.getItem('lastApplication') || '{}');
    
    if (data.name) {
      document.getElementById('successName').textContent = `Thank You, ${data.name.split(' ')[0]}!`;
    }

    const jaihariNumber = "919790792672";
    const message = `Hello Jaihari, I just submitted a loan application on Varagan Finance Website.%0A%0A*Details:*%0AName: ${data.name || 'Not provided'}%0ALoan Type: ${data.type || 'General enquiry'}%0AAmount: ₹${parseInt(data.amount || 0).toLocaleString('en-IN')}%0A%0APlease process my request.`;
    
    const finalLink = `https://wa.me/${jaihariNumber}?text=${message}`;

    // Start progress bar and redirect
    const prog = document.getElementById('waProgress');
    if (prog) {
      setTimeout(() => prog.style.width = '100%', 100);
      setTimeout(() => {
        window.location.href = finalLink;
      }, 2200);
    }
  });
</script>

</body>
</html>
