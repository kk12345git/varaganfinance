<!DOCTYPE html>
<html lang="en-IN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login / Signup — Varagan Finance</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="styles.css">
<link rel="icon" type="image/png" href="logo.png">
<style>
  .auth-bg { 
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at top right, var(--navy), var(--obsidian));
    padding: 2rem;
  }
  .auth-card {
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px); border-radius: 32px; padding: 3rem;
    width: 100%; max-width: 450px; box-shadow: var(--glass-shadow);
  }
  .auth-tabs { display: flex; gap: 1rem; margin-bottom: 2rem; }
  .auth-tab { flex: 1; text-align: center; padding: 1rem; cursor: pointer; border-bottom: 2px solid transparent; color: var(--gray); font-weight: 700; }
  .auth-tab.active { border-color: var(--gold-luxe); color: var(--gold-luxe); }
  
  .auth-input { margin-bottom: 1.2rem; }
  .auth-input label { display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: var(--gray); }
  .auth-input input { 
    width: 100%; padding: 0.8rem; border-radius: 12px; background: rgba(255,255,255,0.03);
    border: 1px solid var(--glass-border); color: var(--text-main); font-size: 1rem;
  }
  .auth-input input:focus { border-color: var(--gold-luxe); outline: none; }
</style>
</head>
<body data-theme="dark">

<div class="auth-bg">
  <div class="auth-card">
    <div style="text-align:center; margin-bottom: 2rem;">
      <a href="index.html"><img src="logo.png" alt="Varagan" style="height: 50px;"></a>
    </div>

    <div class="auth-tabs">
      <div id="loginTab" class="auth-tab active" onclick="showAuth('login')">Login</div>
      <div id="signupTab" class="auth-tab" onclick="showAuth('signup')">Sign Up</div>
    </div>

    <div id="loginForm">
      <div class="auth-input">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="name@example.com">
      </div>
      <div class="auth-input">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="••••••••">
      </div>
      <button class="btn-primary-lg" style="width:100%; justify-content:center;" onclick="handleLogin()">Login <i class="fas fa-sign-in-alt"></i></button>
    </div>

    <div id="signupForm" style="display:none;">
      <div class="auth-input">
        <label>Full Name</label>
        <input type="text" id="signName" placeholder="Enter your name">
      </div>
      <div class="auth-input">
        <label>Email Address</label>
        <input type="email" id="signEmail" placeholder="name@example.com">
      </div>
      <div class="auth-input">
        <label>Mobile Number</label>
        <input type="tel" id="signMobile" placeholder="Enter mobile number">
      </div>
      <div class="auth-input">
        <label>Create Password</label>
        <input type="password" id="signPass" placeholder="••••••••">
      </div>
      <button class="btn-primary-lg" style="width:100%; justify-content:center;" onclick="handleSignup()">Create Account <i class="fas fa-user-plus"></i></button>
    </div>
  </div>
</div>

<script>
function showAuth(type) {
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');
  const loginTab = document.getElementById('loginTab');
  const signupTab = document.getElementById('signupTab');

  if(type === 'login') {
    loginForm.style.display = 'block';
    signupForm.style.display = 'none';
    loginTab.classList.add('active');
    signupTab.classList.remove('active');
  } else {
    loginForm.style.display = 'none';
    signupForm.style.display = 'block';
    loginTab.classList.remove('active');
    signupTab.classList.add('active');
  }
}

async function handleLogin() {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPass').value;

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password})
    });
    const json = await res.json();
    if(json.success) {
      localStorage.setItem('v_token', json.token);
      localStorage.setItem('v_user', JSON.stringify(json.user));
      window.location.href = 'index.html';
    } else {
      alert(json.error || 'Login failed');
    }
  } catch(e) { alert('Connection error'); }
}

async function handleSignup() {
  const full_name = document.getElementById('signName').value;
  const email = document.getElementById('signEmail').value;
  const mobile = document.getElementById('signMobile').value;
  const password = document.getElementById('signPass').value;

  try {
    const res = await fetch('/api/auth/signup', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password, full_name, mobile})
    });
    const json = await res.json();
    if(json.success) {
      alert('Account created! Please login.');
      showAuth('login');
    } else {
      alert(json.error || 'Signup failed');
    }
  } catch(e) { alert('Connection error'); }
}
</script>
</body>
</html>
