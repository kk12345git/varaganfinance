<!DOCTYPE html>
<html lang="en-IN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — Varagan Finance</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="styles.css">
<style>
  .admin-container { padding: 4rem 2rem; max-width: 1200px; margin: 0 auto; }
  .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; }
  .data-card { 
    background: var(--glass-bg); border: 1px solid var(--glass-border); 
    border-radius: 20px; padding: 2rem; margin-bottom: 3rem; overflow-x: auto;
  }
  table { width: 100%; border-collapse: collapse; margin-top: 1rem; color: var(--text-main); }
  th, td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--glass-border); font-size: 0.9rem; }
  th { color: var(--gold-luxe); text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.75rem; }
  tr:hover { background: rgba(255,255,255,0.02); }
  .status-pill { padding: 0.2rem 0.6rem; border-radius: 50px; font-size: 0.7rem; font-weight: 700; }
</style>
</head>
<body data-theme="dark">

<div class="admin-container">
  <div class="admin-header">
    <div>
      <h1 style="font-family: var(--font-display);">Varagan Admin</h1>
      <p style="color: var(--gray);">Lead & Referral Management Console</p>
    </div>
    <button class="btn-outline-sm" onclick="fetchData()"><i class="fas fa-sync"></i> Refresh Data</button>
  </div>

  <div class="data-card">
    <h3 style="margin-bottom: 1.5rem;"><i class="fas fa-users" style="color: var(--gold-luxe);"></i> Recent Customer Leads</h3>
    <table id="leadsTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>Name</th>
          <th>Mobile</th>
          <th>Type</th>
          <th>Amount</th>
          <th>Source</th>
        </tr>
      </thead>
      <tbody>
        <!-- Data injected here -->
      </tbody>
    </table>
  </div>

  <div class="data-card">
    <h3 style="margin-bottom: 1.5rem;"><i class="fas fa-gift" style="color: var(--gold-luxe);"></i> Referral Program</h3>
    <table id="referralsTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>Referrer</th>
          <th>Referrer Mobile</th>
          <th>Friend Name</th>
          <th>Friend Mobile</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <!-- Data injected here -->
      </tbody>
    </table>
  </div>
</div>

<script>
async function fetchData() {
  try {
    const res = await fetch('/api/admin/data');
    const json = await res.json();
    
    // Render Leads
    const leadsBody = document.querySelector('#leadsTable tbody');
    leadsBody.innerHTML = json.leads.map(l => `
      <tr>
        <td>${new Date(l.created_at).toLocaleDateString()}</td>
        <td style="font-weight: 700;">${l.name}</td>
        <td>${l.mobile}</td>
        <td>${l.loan_type}</td>
        <td style="color: var(--gold-luxe);">₹${parseInt(l.amount || 0).toLocaleString('en-IN')}</td>
        <td style="font-size: 0.8rem; opacity: 0.6;">${l.source_page}</td>
      </tr>
    `).join('');

    // Render Referrals
    const refsBody = document.querySelector('#referralsTable tbody');
    refsBody.innerHTML = json.referrals.map(r => `
      <tr>
        <td>${new Date(r.created_at).toLocaleDateString()}</td>
        <td style="font-weight: 700;">${r.referrer_name}</td>
        <td>${r.referrer_mobile}</td>
        <td>${r.friend_name}</td>
        <td>${r.friend_mobile}</td>
        <td><span class="status-pill" style="background: rgba(212,160,23,0.1); color: var(--gold-luxe);">${r.status}</span></td>
      </tr>
    `).join('');

  } catch (err) {
    console.error('Fetch error:', err);
  }
}

// Initial fetch
fetchData();
</script>
</body>
</html>
